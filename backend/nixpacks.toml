# nixpacks.toml — Configuration de build pour Railway (Nixpacks builder)
# Root Directory doit être défini sur "backend" dans Railway Settings

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
aptPkgs = [
  "curl",
  "libmagic1",
  "libgl1",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender1",
  "libgomp1"
]

# Ne pas surcharger [phases.install] — Nixpacks gère automatiquement
# "pip install -r requirements.txt" avec le bon venv activé

[start]
cmd = "bash startup.sh && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 75"
