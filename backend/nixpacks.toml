# nixpacks.toml — Configuration de build pour Railway
# Equivalent du Aptfile Heroku, mais compatible Nixpacks

[phases.setup]
aptPkgs = [
  "curl",
  "libmagic1",
  "libgl1-mesa-glx",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender-dev",
  "libgomp1"
]

[start]
cmd = "bash startup.sh && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 75"
