# nixpacks.toml — Configuration de build pour Railway (Nixpacks builder)
# Root Directory doit être défini sur "backend" dans Railway Settings
#
# Stratégie :
#   - aptPkgs : libs système (libGL, glib…) → installées dans /usr/lib
#   - LD_LIBRARY_PATH : expose /usr/lib au venv Nix (sinon cv2 ne trouve pas libGL.so.1)
#   - phases.build : force opencv-headless après que ultralytics ait tiré opencv-python

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
LD_LIBRARY_PATH = "/usr/lib/x86_64-linux-gnu:/usr/lib"

[phases.setup]
aptPkgs = [
  "curl",
  "libmagic1",
  "libgl1",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender1",
  "libgomp1"
]

[phases.build]
cmds = [
  "pip uninstall -y opencv-python opencv-contrib-python || true",
  "pip install --force-reinstall opencv-python-headless==4.8.1.78"
]

[start]
cmd = "sh startup.sh && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120"
