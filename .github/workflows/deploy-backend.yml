name: 🚄 Deploy Backend — Railway

# Railway se connecte directement à GitHub et auto-déploie à chaque push sur main.
# Ce workflow sert de CONTRÔLE CI : il vérifie que le build Docker fonctionne
# avant que Railway effectue le déploiement réel.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  validate-docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Code (avec LFS pour le modèle YOLO) ────────────────
      - name: 📥 Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Vérification de la taille de l'image ───────────────
      - name: 🐳 Build Docker image (validation uniquement)
        working-directory: backend
        run: |
          docker build -t bodyvision-backend:ci .
          echo "✅ Docker build succeeded"

      # ── 3. Test de santé rapide ───────────────────────────────
      - name: 🏥 Health check du container
        run: |
          docker run -d --name bv-test \
            -e DB_HOST=localhost \
            -e DB_NAME=test \
            -e DB_USER=test \
            -e DB_PASSWORD=test \
            -e JWT_SECRET_KEY=test_secret_key_min_32_chars_long \
            -e JWT_REFRESH_SECRET_KEY=test_refresh_key_min_32_chars \
            -e GROQ_API_KEY=test \
            -p 8001:8000 \
            bodyvision-backend:ci
          sleep 10
          curl --fail http://localhost:8001/ || echo "⚠️ Health check failed (DB not connected in CI — normal)"
          docker stop bv-test || true

      - name: ✅ Validation terminée
        run: echo "Docker image valide. Railway déploiera automatiquement."
