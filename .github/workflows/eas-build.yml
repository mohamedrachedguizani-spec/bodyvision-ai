name: 📱 EAS Build — APK Android

on:
  push:
    branches: [main]
    paths:
      - "frontend/BodyVisionAI/**"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profil EAS"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build-android:
    name: 📦 Build APK Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/BodyVisionAI

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/BodyVisionAI/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ Build APK Android
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: 📲 Lien de téléchargement
        run: |
          echo "✅ Build APK lancé sur EAS!"
          echo "📲 Télécharger depuis :"
          echo "   https://expo.dev/accounts/${{ secrets.EXPO_USERNAME }}/projects/bodyvision-ai/builds"
          echo "⏱️  Durée estimée : 15–25 minutes"

